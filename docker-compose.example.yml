services:
    app:
        image: newdoublex/amiya-eden:latest
        container_name: amiya-eden
        restart: unless-stopped
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            - TZ=Asia/Shanghai
        volumes:
            # 挂载配置文件
            - /root/dockers/amiya-eden/config.yaml:/app/config/config.yaml:ro
            # 持久化日志
            - /root/dockers/amiya-eden/logs:/app/logs
            # 持久化数据
            - /root/dockers/amiya-eden/uploads:/app/uploads
            # 前端静态文件持久化：首次启动时由 entrypoint 从镜像自动初始化，
            # 之后可通过系统设置 → 服务器更新 热更新前端，无需重建镜像。
            - /root/dockers/amiya-eden/html:/usr/share/nginx/html
        ports:
            - "80:80"
        networks:
            - amiya-eden-network

    redis:
        image: redis:latest
        container_name: amiya-eden-redis
        restart: unless-stopped
        command: redis-server --requirepass "amiya_eden_redis_password"
        environment:
            - TZ=Asia/Shanghai
        volumes:
            - /root/dockers/amiya-eden/redis_data:/data
        networks:
            - amiya-eden-network

    postgres:
        image: postgres:latest
        container_name: amiya-eden-postgres
        restart: unless-stopped
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=amiya_eden_password
            - POSTGRES_DB=amiya_eden
            - TZ=Asia/Shanghai
        volumes:
            - /root/dockers/amiya-eden/database:/var/lib/postgresql/data
        networks:
            - amiya-eden-network

networks:
    amiya-eden-network:
        driver: bridge
