name: Deploy to Private Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 构建前端并推送到服务器
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: static
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: static
        run: pnpm build

      - name: Package dist
        working-directory: static
        run: tar -czf ../dist.tar.gz dist/

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: dist.tar.gz
          target: /tmp/

      - name: Extract dist on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo ">>> 解压前端文件..."
            tar -xzf /tmp/dist.tar.gz -C /tmp/
            sudo rsync -a --delete /tmp/dist/ ${{ secrets.FRONTEND_PATH }}/
            rm -rf /tmp/dist.tar.gz /tmp/dist
            echo ">>> 前端部署完成！"

  # ─────────────────────────────────────────────
  # Job 2: 后端 —— 拉代码 + sudo docker compose
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH }}

            echo ">>> 拉取最新代码..."
            git pull origin main

            echo ">>> 构建并启动后端容器..."
            sudo docker compose up -d --build --remove-orphans

            echo ">>> 清理无用镜像..."
            sudo docker image prune -f

            echo ">>> 后端部署完成！"

      - name: Notify on failure
        if: failure()
        run: echo "::error::后端部署失败，请检查服务器日志"
